<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Oracle Wheel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 90%; max-width: 500px; padding: 20px; }
        h1 { color: #00f2fe; text-shadow: 0 0 10px #00f2fe; }
        
        .mode-selection button { padding: 15px; margin: 10px; font-size: 1.1rem; border-radius: 10px; border: none; cursor: pointer; transition: 0.3s; width: 80%; }
        #btn-direct { background: #4caf50; color: white; }
        #btn-spin { background: #e94560; color: white; }

        .input-box { display: none; margin-top: 20px; }
        input { padding: 12px; width: 80%; border-radius: 5px; border: none; font-size: 1rem; margin-bottom: 10px; }
        
        .wheel-area { display: none; position: relative; width: 300px; height: 300px; margin: 30px auto; }
        .pointer { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #fff; z-index: 10; }
        #canvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid white; transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1); }
        
        #final-result { font-size: 2rem; color: #ffd700; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container" id="main-ui">
        <h1>🔮 The Oracle</h1>
        <div class="mode-selection" id="mode-select">
            <button id="btn-direct" onclick="showDirect()">1. Direct Answer 💬</button>
            <button id="btn-spin" onclick="showSpin()">2. Spin the Wheel 🎡</button>
        </div>

        <div id="direct-input" class="input-box">
            <input type="text" id="direct-q" placeholder="Type your question here...">
            <button onclick="sendDirect()" style="background:#4caf50; color:white; padding:10px 20px; border:none; border-radius:5px;">Ask!</button>
        </div>

        <div id="spin-input" class="input-box">
            <input type="text" id="spin-q" placeholder="The Question?">
            <p>Enter options (comma separated):</p>
            <input type="text" id="options-list" placeholder="Pizza, Burger, Pasta...">
            <button onclick="sendSpin()" style="background:#e94560; color:white; padding:10px 20px; border:none; border-radius:5px;">Create Wheel & Spin!</button>
        </div>

        <div class="wheel-area" id="wheel-area">
            <div class="pointer"></div>
            <canvas id="canvas" width="300" height="300"></canvas>
        </div>

        <div id="final-result"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCxu_TKOqfG7rX8nZ0Z2yvLGCk9y-O7C3o",
            authDomain: "spin-fb097.firebaseapp.com",
            databaseURL: "https://spin-fb097-default-rtdb.firebaseio.com",
            projectId: "spin-fb097",
            storageBucket: "spin-fb097.firebasestorage.app",
            messagingSenderId: "258399373729",
            appId: "1:258399373729:web:9e4ccd970ead64e674e3e0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showDirect() { 
            document.getElementById('mode-select').style.display = 'none';
            document.getElementById('direct-input').style.display = 'block';
        }
        function showSpin() {
            document.getElementById('mode-select').style.display = 'none';
            document.getElementById('spin-input').style.display = 'block';
        }

        function sendDirect() {
            const q = document.getElementById('direct-q').value;
            db.ref('oracle').set({ mode: 'direct', question: q, status: 'waiting' });
            document.getElementById('final-result').innerText = "Waiting for the Universe... ✨";
        }

        function sendSpin() {
            const q = document.getElementById('spin-q').value;
            const opts = document.getElementById('options-list').value.split(',').map(s => s.trim());
            db.ref('oracle').set({ mode: 'spin', question: q, options: opts, status: 'spinning' });
            drawWheel(opts);
            document.getElementById('spin-input').style.display = 'none';
            document.getElementById('wheel-area').style.display = 'block';
            startInfiniteSpin();
        }

        // Infinite Spin logic
        let currentRot = 0;
        let spinInt;
        function startInfiniteSpin() {
            spinInt = setInterval(() => {
                currentRot += 15;
                document.getElementById('canvas').style.transform = `rotate(${currentRot}deg)`;
            }, 20);
        }

        // Draw dynamic wheel
        function drawWheel(options) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const arc = Math.PI / (options.length / 2);
            options.forEach((opt, i) => {
                ctx.fillStyle = i % 2 === 0 ? "#e94560" : "#0f3460";
                ctx.beginPath(); ctx.moveTo(150, 150); ctx.arc(150, 150, 150, i * arc, (i + 1) * arc); ctx.fill();
                ctx.save(); ctx.fillStyle = "white"; ctx.translate(150, 150); ctx.rotate(i * arc + arc / 2);
                ctx.fillText(opt, 70, 5); ctx.restore();
            });
        }

        db.ref('oracle').on('value', snap => {
            const data = snap.val();
            if (data.status === 'resolved') {
                if (data.mode === 'direct') {
                    document.getElementById('final-result').innerText = data.result;
                } else if (data.mode === 'spin') {
                    clearInterval(spinInt);
                    const idx = data.options.indexOf(data.result);
                    const arcDeg = 360 / data.options.length;
                    const target = currentRot + 1440 + (360 - (idx * arcDeg) - (currentRot % 360));
                    document.getElementById('canvas').style.transition = 'transform 4s cubic-bezier(0.1, 0.7, 0.1, 1)';
                    document.getElementById('canvas').style.transform = `rotate(${target}deg)`;
                }
            }
        });
    </script>
</body>
</html>
