<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Wheel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #1a1a2e; color: white; overflow: hidden; text-align: center;}
        h1 { font-size: 2.2rem; margin-bottom: 20px; color: #00f2fe; text-shadow: 0 0 10px rgba(0,242,254,0.5); }
        
        .input-section { margin-bottom: 30px; z-index: 20; position: relative; }
        input { padding: 12px; font-size: 1.2rem; border-radius: 8px; border: none; width: 250px; outline: none; }
        button { padding: 12px 25px; font-size: 1.2rem; background-color: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px; font-weight: bold; }
        
        .wheel-container { position: relative; width: 300px; height: 300px; margin-top: 20px; }
        .pointer { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #fff; z-index: 10; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); }
        
        .wheel { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#4caf50 0deg 180deg, #f44336 180deg 360deg); border: 5px solid white; position: relative; }
        
        .label { position: absolute; font-size: 2rem; font-weight: bold; color: white; top: 50%; left: 50%; transform-origin: center; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .yes-label { transform: translate(-50%, -50%) translateY(-70px); }
        .no-label { transform: translate(-50%, -50%) translateY(70px) rotate(180deg); }
        
        #status-text { font-size: 1.5rem; margin-top: 40px; color: #fbd786; min-height: 35px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🔮 The Magic Wheel</h1>
    
    <div class="input-section">
        <input type="text" id="userQuestion" placeholder="Pucho apna sawal...">
        <button onclick="askQuestion()">Spin!</button>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
            <div class="label yes-label">YES</div>
            <div class="label no-label">NO</div>
        </div>
    </div>

    <div id="status-text">Apna sawal likho aur Spin dabao!</div>

    <script>
        // Tumhara updated Firebase Config (Database URL ke sath)
        const firebaseConfig = {
            apiKey: "AIzaSyCxu_TKOqfG7rX8nZ0Z2yvLGCk9y-O7C3o",
            authDomain: "spin-fb097.firebaseapp.com",
            databaseURL: "https://spin-fb097-default-rtdb.firebaseio.com", 
            projectId: "spin-fb097",
            storageBucket: "spin-fb097.firebasestorage.app",
            messagingSenderId: "258399373729",
            appId: "1:258399373729:web:9e4ccd970ead64e674e3e0"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        
        const wheel = document.getElementById('wheel');
        const statusText = document.getElementById('status-text');
        
        let currentRotation = 0;
        let isSpinning = false;
        let spinInterval;

        // Wheel ko non-stop ghumane ka function
        function startContinuousSpin() {
            if (isSpinning) return;
            isSpinning = true;
            wheel.style.transition = 'none'; // Smooth CSS transition hata do
            statusText.innerText = "Wheel apni shaktiyon se answer dhoondh raha hai... ✨";
            
            spinInterval = setInterval(() => {
                currentRotation += 15; // Speed of the infinite spin
                wheel.style.transform = `rotate(${currentRotation}deg)`;
            }, 20); // Har 20 milliseconds mein ghumega
        }

        // Answer aane par wheel ko rokne ka function
        function stopAtResult(result) {
            clearInterval(spinInterval);
            isSpinning = false;
            
            // Ab rokne ke liye smooth transition lagao
            wheel.style.transition = 'transform 3s cubic-bezier(0.1, 0.7, 0.1, 1)';
            
            const extraSpins = 3 * 360; 
            let targetDegree;
            const randomOffset = Math.floor(Math.random() * 50) - 25; 

            if (result === 'YES') {
                targetDegree = currentRotation + extraSpins + 360 - (currentRotation % 360) + randomOffset;
            } else {
                targetDegree = currentRotation + extraSpins + 360 - (currentRotation % 360) + 180 + randomOffset;
            }

            currentRotation = targetDegree;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // Jab wheel ruk jaye tab result dikhao
            setTimeout(() => {
                statusText.innerText = `Final Answer: ${result}! 🎯`;
            }, 3000);
        }

        function askQuestion() {
            const q = document.getElementById('userQuestion').value;
            if(!q) return alert("Bina sawal ke wheel nahi ghumega!");
            
            startContinuousSpin(); // Spin turant shuru!
            
            // Database mein bhejo
            db.ref('wheelData').set({
                question: q,
                status: "spinning",
                result: "",
                timestamp: Date.now()
            });
        }

        // Admin ke answer ka wait karna
        db.ref('wheelData').on('value', (snapshot) => {
            const data = snapshot.val();
            // Jab admin ka decision aa jaye
            if(data && data.status === "resolved" && isSpinning) {
                stopAtResult(data.result);
            }
        });
    </script>
</body>
</html>
